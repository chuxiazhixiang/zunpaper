# 数据源开关。Phase 1 只用 arxiv，其它源在 Phase 2 接入。
sources:
  arxiv:
    enabled: true
    # 拉取最近 N 天内发布的论文（含当天）
    # 5 天的窗口能保证周末没断更，也能在改动 channels.yaml 后让一轮 daily
    # 把新关键词重新匹配到一批最近的论文上。
    lookback_days: 5
    # 单次拉取上限（每个 channel），避免初次跑爆
    per_channel_limit: 60

  hf_daily:
    enabled: false
    lookback_days: 2

  semantic_scholar:
    enabled: false

  alphaxiv:
    enabled: false

  qbitai:           # 量子位
    enabled: false
    lookback_days: 3

  jiqizhixin:       # 机器之心
    enabled: false
    lookback_days: 3

  synced_review:    # 新智元
    enabled: false
    lookback_days: 3

  manual_xhs:       # 手动维护的小红书 URL 列表
    enabled: false
    file: config/manual_xhs.json

  manual_arxiv:     # 「贴 arxiv 链接就上墙」的精选清单
    enabled: true
    file: config/manual_arxiv.yaml
