# 数据源开关。Phase 1 只用 arxiv，其它源在 Phase 2 接入。
sources:
  arxiv:
    enabled: true
    # 拉取最近 N 天内发布的论文（含当天）。可以被环境变量 REDPAPER_ARXIV_LOOKBACK_DAYS
    # 一次性覆盖（workflow_dispatch 里的 lookback_days_override 输入会注入这个环境变量）。
    #
    # 为什么是 4 而不是 2：arXiv 按「提交日期(submittedDate)」过滤，但提交日常比
    # 公告日早 2-3 天 —— 尤其周五提交的论文要到周日晚美东 20:00（北京周一 08:00）
    # 才公告。窗口太窄（2 天）时，周一跑 build 截止日是周六，会把刚公告、但提交日
    # 是周五的一大批论文整批漏掉（只能靠下面 evergreen 兜底，而它只在窗口 < 8 篇时
    # 才触发，不够稳）。放宽到 4 天让主窗口直接覆盖「周五提交 / 周一公告」的间隔。
    lookback_days: 4
    # 单次拉取上限（每个 channel），避免初次跑爆
    per_channel_limit: 120
    # "evergreen 回补"：如果按 lookback_days 拉完一遍后，所有 channel 加起来
    # 还没 evergreen_min_papers 篇，就放宽窗口到 evergreen_fallback_days
    # 再拉一次，专门捞过去一段时间内的高质量论文。
    evergreen_min_papers: 8
    evergreen_fallback_days: 30

  hf_daily:
    enabled: false
    lookback_days: 2

  semantic_scholar:
    enabled: false

  alphaxiv:
    enabled: false

  # ---------- 公众号 / 行业策展 ----------
  # 站长精选的高学术含量号；其它（雷峰网/36kr/IEEE Spectrum/Robohub/TheRobotReport/
  # TechCrunch/Synced Review）已删除 —— 它们更多是融资八卦 / 会议广告。
  qbitai:           # 量子位（qbitai.com 直接抓 RSS + /page/N HTML 归档）
    enabled: true
    lookback_days: 60

  embodied_techdaily:   # 具身智能之心 / 具身智能之心TechDaily（jintiankansha 镜像）
    enabled: true
    lookback_days: 60

  shenlan_embodied:     # 深蓝具身智能 / 深蓝AI（jintiankansha 镜像）
    enabled: true
    lookback_days: 60

  # 下列源因公开入口不稳定，暂未自动抓；如想加可走 manual_xhs.json 手动挂：
  #   - 具身智能研究室（CSDN/公众号，JS 渲染，需要 headless browser）
  #   - 智猩猩公开课（course.zhidx.com，是课程信息而非文章）
  jiqizhixin:           # 机器之心 — 公开 RSS 已下线
    enabled: false
    lookback_days: 60

  manual_xhs:       # 手动维护的小红书 URL 列表
    enabled: false
    file: config/manual_xhs.json

  manual_arxiv:     # 「贴 arxiv 链接就上墙」的精选清单
    enabled: true
    file: config/manual_arxiv.yaml

  # ---------- P5: 视频频道源 ----------
  # YouTube：Boston Dynamics / Unitree / Figure / 1X 等厂商官方 demo。
  # Bilibili：宇树 / 智元 / 量子位 等国内具身机器人圈大号。
  # 频道清单写死在 scripts/redpaper/sources/video_channels.py:BUILT_IN_CHANNELS。
  # 每条视频包成一个 Paper 卡，跟新闻一样通过 from_media 评分上首页。
  video_channels:
    enabled: true
    per_channel: 6            # 每个频道最多拿 N 条
    lookback_days: 30         # 只要近 30 天的视频

  # ---------- P7: LLM 联网发现 ----------
  # discover.py 用 Gemini flash 带 google_search grounding 主动找最近 arxiv
  # 论文，专门补 channels.yaml 关键词漏召回的工作（新工作命名 / 新平台）。
  # 多模型 fallback：gemini-2.5-flash → 2.0-flash → 2.5-flash-lite。
  # 必须有 GEMINI_API_KEY 才会真联网；没 key 时整步跳过（不再回退 DeepSeek
  # 知识推理 —— DeepSeek 不能联网，纯靠记忆会编连号假 arxiv ID）。
  # 候选 ID 全部走 arxiv API 验证一遍，防 LLM 幻觉编 ID。
  discover:
    enabled: true
    lookback_days: 14         # 让 LLM 限定在近 N 天内找
    per_channel: 5            # 每个频道最多让 LLM 推 N 篇

  # ---------- 开源项目栏目 ----------
  # github_repos.py 在一组关键词上跑 GitHub search（stars >= min_stars，fork:false），
  # 候选交给 judge.judge_repo 让 LLM 砍掉课程 / awesome / 复现 / 蹭名 / 跑题，
  # 留下的做成「开源项目」tab 的卡片（按 star 排）。judge 结果走 judge_cache 复用，
  # 所以挂在每日 build 里也几乎零成本（慢变集合，只判新跨过门槛的仓）。
  github:
    enabled: true
    min_stars: 300            # 硬门槛：兜住 AMO/ExBody/HumanPlus 这档优质论文仓
    max_repos: 120            # 单次召回上限（去重后按 star 截断）
    refresh_days: 7           # 每 N 天才重新召回一次（候选是慢变集合，无需日日扫）

  # 会议官网源：OpenReview 已接收论文（免鉴权 v2 API）。按频道关键词过滤出机器人
  # 相关的，与 arXiv 靠标题去重。venue_ids 用 OpenReview 的 venueid（放榜后才有数据）。
  # 不渲染 PDF 封面（占位），避免几百篇 PDF 渲染拖垮 CI。慢变集合，refresh_days 节流。
  openreview:
    enabled: true
    max_per_venue: 50
    refresh_days: 14
    venue_ids:
      - "robot-learning.org/CoRL/2024/Conference"
      - "robot-learning.org/CoRL/2025/Conference"
      # 其余（ICLR/NeurIPS/ICML/CoRL 当年+次年）由 conferences.yaml 的 openreview 模板自动推导。

  # 会议/期刊源（Semantic Scholar 按 venue+year 检索）：补 OpenReview 覆盖不到的
  # CVPR/ICCV/ECCV/RA-L/ICML 等。返回带 arXiv id → 与站内 arXiv 论文按 slug 去重/合并。
  # query 是 S2 的 venue 检索名；short 是展示简称；year 是要回填的「去年中稿」年份。
  # 双年会注意年份：ICCV 奇数年、ECCV 偶数年。RSS 在 S2 索引不全，靠 arXiv comment。
  conf_papers:
    enabled: true
    max_per_venue: 20        # 控量：一次别灌太多新论文，避免翻译/enrich 把 CI 拖到超时
    refresh_days: 14
    venues:
      - { query: "CVPR", short: "CVPR", year: 2025 }
      - { query: "ICCV", short: "ICCV", year: 2025 }
      - { query: "ECCV", short: "ECCV", year: 2024 }
      - { query: "IEEE Robotics and Automation Letters", short: "RA-L", year: 2025 }
      - { query: "ICML", short: "ICML", year: 2025 }
      - { query: "International Conference on Learning Representations", short: "ICLR", year: 2025 }
      - { query: "NeurIPS", short: "NeurIPS", year: 2024 }
