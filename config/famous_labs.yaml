# =================================================================
# 顶尖实验室 / 大组 / 关键作者 — 在帖子上打 ⭐ 徽章用
# =================================================================
# 这是 redpaper 的「贵宾名单」。每天 build 时 pipeline 会扫描所有
# 论文的 affiliation 字段 + 摘要 + 作者名，命中任何一条 pattern
# 就在卡片上挂一个 "⭐ <label>" 徽章。
#
# 匹配规则：
# - 大小写不敏感
# - 作为子串匹配（不是正则；如要正则，可在 pattern 前后加 / /，
#   见 `_match` 里的解析逻辑）
# - 任意 pattern 命中就算这一条 label 命中
# - 同一张卡片不会重复同一个 label
#
# 名单来源：站长 Zotero 库 282 篇里出现频率最高的「通讯/末作者」+
#          2024–2026 人形机器人圈活跃的公司与高校组。
# =================================================================

