# 频道配置：每个频道 = 一组标签 / arXiv 分类 / 关键词
# 增删频道直接改这个文件，pipeline 会自动按频道拉取去重
#
# 字段说明：
#   id                频道 ID（URL 用，英文小写）
#   name              频道显示名（中文）
#   emoji             Tab 上的小图标
#   arxiv_categories  arXiv 分类码（https://arxiv.org/category_taxonomy）
#   keywords          标题/摘要必须包含其中至少一个词才算命中（OR 关系，留空 = 不过滤）
#   exclude           标题/摘要包含任意一个就排除（兜底过滤生物医工等非感兴趣方向）
#   max_per_day       每天最多拉多少篇，超过的丢弃低分的
#
# 当前配置面向「人形机器人 / 通用机器人」方向。
# 偏好顺序：whole-body > loco-manip > vla > 其他，max_per_day 倾斜过来。

# 通用排除关键词 —— 出现这些任意一个就跳过整篇（生物医工 / 临床方向不要）
_global_exclude: &MEDICAL_EXCLUDE
  - surgical
  - surgery
  - clinical trial
  - clinical
  - patient
  - medical imaging
  - biomedical engineering
  - prosthetic limb
  - prosthesis
  - rehabilitation robot
  - exoskeleton therapy
  - MRI
  - electroencephalo
  - EEG signal
  - tumor
  - diagnosis
  - radiology

channels:
  - id: locomotion
    name: Locomotion
    emoji: "🦿"
    arxiv_categories: [cs.RO, cs.LG]
    keywords:
      - locomotion
      - bipedal
      - quadruped
      - humanoid walk
      - walking gait
      - gait generation
      - legged robot
      - balance control humanoid
      - parkour
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 12

  - id: whole-body
    name: 全身控制
    emoji: "🤸"
    arxiv_categories: [cs.RO, cs.SY, eess.SY]
    keywords:
      - whole-body control
      - whole body control
      - whole-body manipulation
      - whole body manipulation
      - WBC
      - dynamic balance
      - centroidal
      - MPC humanoid
      - reactive whole-body
      - humanoid robot control
      - whole-body policy
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 30        # ←偏好方向：拉多一点

  - id: manipulation
    name: 操作 / 灵巧手
    emoji: "🖐️"
    arxiv_categories: [cs.RO, cs.CV]
    keywords:
      - dexterous manipulation
      - in-hand manipulation
      - dexterous grasp
      - tactile manipulation
      - bimanual manipulation
      - imitation learning
      - diffusion policy
      - action chunking
      - manipulation skill
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 12

  - id: loco-manip
    name: 移动操作
    emoji: "🛒"
    arxiv_categories: [cs.RO]
    keywords:
      - loco-manipulation
      - mobile manipulation
      - whole-body manipulation
      - mobile robot manipulation
      - long-horizon manipulation
      - mobile manipulator
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 25        # ←偏好方向

  - id: perception
    name: 感知 / 导航
    emoji: "🧭"
    arxiv_categories: [cs.RO, cs.CV]
    keywords:
      - robot SLAM
      - 3D scene robot
      - occupancy network
      - depth estimation robot
      - visual navigation
      - exploration robot
      - terrain robot
      - tactile sensing
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 8

  - id: vla
    name: VLA / 全身策略
    emoji: "🤖"
    arxiv_categories: [cs.RO, cs.LG, cs.CV]
    keywords:
      - vision-language-action
      - VLA model
      - whole-body VLA
      - whole body VLA
      - generalist robot policy
      - foundation policy
      - robot foundation model
      - RT-2
      - π0
      - openvla
      - octo policy
      - humanoid policy
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 25        # ←偏好方向（含 Whole-body VLA）

  - id: vln
    name: 视觉语言导航
    emoji: "🗺️"
    arxiv_categories: [cs.RO, cs.CV, cs.CL]
    keywords:
      - vision-language navigation
      - VLN
      - instruction-following navigation
      - embodied navigation
      - habitat benchmark
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 6

  - id: llm
    name: 机器人大模型
    emoji: "🧠"
    arxiv_categories: [cs.CL, cs.LG, cs.AI]
    keywords:
      - LLM robot
      - LLM for robot
      - LLM agent robot
      - tool use robot
      - code-as-policies
      - embodied LLM
      - SayCan
      - reasoning robotics
      - chain-of-thought robot
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 6
