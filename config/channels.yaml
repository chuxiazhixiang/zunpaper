# 频道配置：用户指定的 5 大类（2026-05-12 重组）
#
# Loco-Manipulation and Whole-Body-Control  → loco-manip-wbc
# Manipulation                              → manipulation
# Teleoperation                             → teleop
# Locomotion                                → locomotion
# Sim-to-Real                               → sim2real
#
# 字段说明：
#   id                频道 ID（URL 用，英文小写）
#   name              频道显示名（用户原文）
#   emoji             Tab 上的小图标
#   arxiv_categories  arXiv 分类码
#   keywords          标题/摘要包含其中至少一个就算命中（OR 关系）
#   exclude           包含任意一个就排除
#   max_per_day       软上限：每个频道每次拉多少
#
# 一篇 paper 可以同时被多个频道匹配（如「人形机器人 sim-to-real teleop」）；
# 用户在主页通过 channel tab 过滤。
#
# 全局排除（医疗 / 临床 / 康复，不要）
_global_exclude: &MEDICAL_EXCLUDE
  - surgical
  - surgery
  - clinical trial
  - patient outcome
  - medical imaging
  - biomedical engineering
  - prosthetic limb
  - rehabilitation robot
  - exoskeleton therapy
  - electroencephalo
  - EEG signal
  - tumor
  - radiology
  - cancer

