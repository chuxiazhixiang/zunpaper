# 频道配置：每个频道 = 一组标签 / arXiv 分类 / 关键词
# 增删频道直接改这个文件，pipeline 会自动按频道拉取去重
#
# 字段说明：
#   id                频道 ID（URL 用，英文小写）
#   name              频道显示名（中文）
#   emoji             Tab 上的小图标
#   arxiv_categories  arXiv 分类码（https://arxiv.org/category_taxonomy）
#   keywords          标题/摘要必须包含其中至少一个词才算命中（OR 关系，留空 = 不过滤）
#   exclude           标题/摘要包含任意一个就排除（兜底过滤生物医工等非感兴趣方向）
#   max_per_day       软上限：每个频道每次拉多少，超过的按分数排弃
#
# 关键词来源：站长 Zotero 库 282 篇人形机器人论文挖掘 +
#             2024–2026 ICRA/IROS/CoRL/RSS/RA-L 顶会标题。
#             所有关键词都聚焦在留下的 5 个频道方向，不再扩到通用 AI。
#
# 当前偏好顺序：whole-body ≈ vla ≈ loco-manip > manipulation > locomotion

# 通用排除：临床 / 医疗器械 / 康复方向不要
_global_exclude: &MEDICAL_EXCLUDE
  - surgical
  - surgery
  - clinical trial
  - patient outcome
  - medical imaging
  - biomedical engineering
  - prosthetic limb
  - rehabilitation robot
  - exoskeleton therapy
  - electroencephalo
  - EEG signal
  - tumor
  - radiology
  - cancer

