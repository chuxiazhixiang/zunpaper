# 频道配置：每个频道 = 一组标签 / arXiv 分类 / 关键词
# 增删频道直接改这个文件，pipeline 会自动按频道拉取去重
#
# 字段说明：
#   id                频道 ID（URL 用，英文小写）
#   name              频道显示名（中文）
#   emoji             Tab 上的小图标
#   arxiv_categories  arXiv 分类码（https://arxiv.org/category_taxonomy）
#   keywords          标题/摘要必须包含其中至少一个词才算命中（OR 关系，留空 = 不过滤）
#   exclude           标题/摘要包含任意一个就排除（兜底过滤生物医工等非感兴趣方向）
#   max_per_day       软上限：每个频道每次拉多少，超过的按分数排弃
#
# 当前配置面向「人形机器人 / 通用机器人」方向，偏好顺序：
#     whole-body > loco-manip > vla > 其他

# 通用排除：临床 / 医疗器械 / 康复方向不要
_global_exclude: &MEDICAL_EXCLUDE
  - surgical
  - surgery
  - clinical trial
  - patient outcome
  - medical imaging
  - biomedical engineering
  - prosthetic limb
  - rehabilitation robot
  - exoskeleton therapy
  - electroencephalo
  - EEG signal
  - tumor
  - radiology
  - cancer

channels:
  - id: locomotion
    name: Locomotion
    emoji: "🦿"
    arxiv_categories: [cs.RO, cs.LG]
    keywords:
      - locomotion
      - bipedal
      - quadruped
      - humanoid
      - walking
      - gait
      - legged robot
      - parkour
      - balance control
      - jumping robot
      - running robot
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 15

  - id: whole-body
    name: 全身控制
    emoji: "🤸"
    arxiv_categories: [cs.RO, cs.SY, eess.SY]
    keywords:
      - whole-body
      - whole body
      - WBC
      - centroidal
      - dynamic balance
      - reactive control
      - humanoid control
      - humanoid policy
      - MPC
      - full-body
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 30        # ← 偏好方向：多拉一点

  - id: manipulation
    name: 操作 / 灵巧手
    emoji: "🖐️"
    arxiv_categories: [cs.RO, cs.CV]
    keywords:
      - manipulation
      - dexterous
      - grasp
      - in-hand
      - tactile
      - bimanual
      - imitation learning
      - diffusion policy
      - action chunking
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 15

  - id: loco-manip
    name: 移动操作
    emoji: "🛒"
    arxiv_categories: [cs.RO]
    keywords:
      - loco-manipulation
      - mobile manipulation
      - whole-body manipulation
      - mobile robot manipulation
      - long-horizon manipulation
      - mobile manipulator
      - humanoid manipulation
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 25        # ← 偏好方向

  - id: perception
    name: 感知 / 导航
    emoji: "🧭"
    arxiv_categories: [cs.RO, cs.CV]
    keywords:
      - SLAM
      - 3D scene
      - occupancy
      - point cloud
      - depth estimation
      - visual navigation
      - exploration
      - terrain
      - tactile sensing
      - robot perception
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 8

  - id: vla
    name: VLA / 全身策略
    emoji: "🤖"
    arxiv_categories: [cs.RO, cs.LG, cs.CV]
    keywords:
      - vision-language-action
      - VLA
      - whole-body VLA
      - generalist policy
      - foundation policy
      - robot foundation model
      - RT-2
      - π0
      - openvla
      - octo
      - humanoid policy
      - embodied policy
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 25        # ← 偏好方向（含 whole-body VLA）

  - id: vln
    name: 视觉语言导航
    emoji: "🗺️"
    arxiv_categories: [cs.RO, cs.CV, cs.CL]
    keywords:
      - vision-language navigation
      - VLN
      - instruction-following navigation
      - embodied navigation
      - habitat
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 6

  - id: llm
    name: 机器人大模型
    emoji: "🧠"
    arxiv_categories: [cs.CL, cs.LG, cs.AI]
    keywords:
      - LLM agent
      - LLM robot
      - tool use
      - code-as-policies
      - embodied LLM
      - SayCan
      - reasoning robot
      - chain-of-thought robot
      - planning LLM robot
    exclude: *MEDICAL_EXCLUDE
    max_per_day: 6
