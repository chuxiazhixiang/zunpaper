site:
  title: redpaper
  subtitle: 每日人形机器人论文小红书
  author: Nangongyeee
  primary_color: "#FF2442"   # 小红书品牌红
  accent_color: "#FF6B8A"
  feed_page_size: 60
  default_channel: llm
  # 访问统计（GoatCounter，免费/隐私友好）。填你的 code（注册后拿到的子域名前缀，
  # 例如注册 redpaper → 这里填 "redpaper"）即可开启；留空 = 不统计。
  # 见 README / 对话里的「手把手」步骤。
  goatcounter: "redpaper"

translation:
  # 模型抽象层；用环境变量选具体后端：
  #   REDPAPER_LLM_BACKEND = gemini | deepseek | openai | dryrun
  # dryrun 不调任何 API，把英文照搬当中文，方便本地无 key 调试
  backend_env: REDPAPER_LLM_BACKEND
  default_backend: gemini
  # 同一篇论文已翻译则跳过
  cache_dir: site/data/papers
