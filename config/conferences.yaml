# 机器人 / 具身相关会议投稿倒计时数据（首页倒计时组件 + venueid 自动推导用）。
#
# 维护：这是慢变数据，一年动一次。日期分两种：
#   deadline:        "MM-DD"  每年大致的投稿截止（递归，前端自动滚到下一个未过的年份，标「预计」）
#   deadline_exact:  "YYYY-MM-DD"  某一届已公布的确切截止（在未来则优先用，标「已确认」）
# 双年会（ICCV 奇数年 / ECCV 偶数年）只填 deadline_exact，过了再更新即可。
#
# 字段：
#   name        显示简称（如 ICRA）
#   full        全称（可选，悬浮/展开里显示）
#   venue       与论文 venue 字段匹配的「去年份基名」，点会议名跳到该会议论文用
#   homepage    会议主页
#   conf        开会时间 / 地点（自由文本，直接展示；未定写「待定」）
#   openreview  （可选）OpenReview venueid 模板，{year} 占位 → build 按当年/次年自动拉接收论文
#
# 期刊（Science Robotics / T-RO / IJRR / RA-L / TAC / T-MECH）是滚动投稿、无年度截止，
# 故不放进倒计时（它们的论文照常靠 arXiv venue 标注 / Crossref 进站）。

