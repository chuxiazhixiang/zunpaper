name: Daily build & deploy

on:
  schedule:
    # 每天 UTC 23:00 = 北京时间次日 07:00 自动跑一次
    # （arXiv 在 UTC 1:00 左右刷出当天投递，等够 22h 保证新论文都进来；
    #   早上推送，刚好早饭时间能看到当日新内容。）
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      llm_backend:
        description: "LLM backend (dryrun | gemini | deepseek | openai)"
        required: false
        default: "deepseek"
      lookback_days_override:
        description: "覆盖 arxiv lookback_days（一次性回补/扩展窗口，留空 = 用 sources.yaml 默认）"
        required: false
        default: ""

permissions:
  contents: write    # 允许把生成的 data 提交回仓库
  pages: write
  id-token: write

concurrency:
  group: redpaper-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          REDPAPER_LLM_BACKEND: ${{ inputs.llm_backend || 'deepseek' }}
          REDPAPER_ARXIV_LOOKBACK_DAYS: ${{ inputs.lookback_days_override || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/build.py

      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data site/assets/img/covers || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
          # Retry-with-rebase in case a human push landed while we were
          # translating: pull --rebase, replay our generated-data commit on
          # top, push again. Up to 3 attempts before giving up.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push attempt $i failed; rebasing and retrying"
            git pull --rebase --autostash origin main || exit 1
          done
          echo "push failed after 3 retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
