name: Daily build & deploy

on:
  schedule:
    # arXiv 投递时刻表（这个改过几次，留个完整记录免得下次又踩坑）：
    #   • arXiv 每周一到五在美东时间 20:00 推送当天「新论文公告」(announcement)
    #   • 夏令时 EDT = UTC-4 → 美东 20:00 = UTC 00:00 = 北京时间 08:00
    #   • 冬令时 EST = UTC-5 → 美东 20:00 = UTC 01:00 = 北京时间 09:00
    # 老的 `0 23 * * *` 在北京 07:00 跑，比 arXiv 还早 1-2 小时，每天稳定拿不到
    # 当天 announcement 的 papers，所以日榜永远是"昨天"。
    #
    # 改成 UTC 03:00 = 北京 11:00（夏令时给 3h buffer / 冬令时给 2h buffer）：
    # arXiv 推送完 + 写入扩散完毕，arXiv API 偶尔的 429/503 也有缓冲；
    # 用户上午（北京 10-11 点）刷新就能看到当日新论文。
    - cron: "0 3 * * *"
    # 兜底：如果 arXiv 早高峰挂了或者主 cron 失败，UTC 06:00 (北京 14:00) 再跑一次
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      llm_backend:
        description: "LLM backend (dryrun | gemini | deepseek | openai)"
        required: false
        default: "deepseek"
      lookback_days_override:
        description: "覆盖 arxiv lookback_days（一次性回补/扩展窗口，留空 = 用 sources.yaml 默认）"
        required: false
        default: ""
      enrich_backfill:
        description: "本轮重抽多少篇 schema 过期的存量论文（留空 = 默认 80；一次性全站迁移可调大）"
        required: false
        default: ""

permissions:
  contents: write    # 允许把生成的 data 提交回仓库
  pages: write
  id-token: write

concurrency:
  group: redpaper-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          REDPAPER_LLM_BACKEND: ${{ inputs.llm_backend || 'deepseek' }}
          REDPAPER_ARXIV_LOOKBACK_DAYS: ${{ inputs.lookback_days_override || '' }}
          REDPAPER_ENRICH_BACKFILL: ${{ inputs.enrich_backfill || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # 开源项目栏目召回 GitHub repos 用（Actions 自带 token，无需额外配 secret）。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build.py

      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 提交完整 site/（含 stamp_assets 改过的 *.html / assets/js 的 ?v= 戳、
          # rss.xml、digest/*.md），保证 git 上的前端与本轮部署的 artifact 一致，
          # 否则手动 deploy.yml（从 git 部署）会用旧 ?v= 的 HTML 覆盖正确产物。
          # data/*.json 是 LLM 判定 / 翻译 / enrich 的累积缓存 —— 不 commit 回去
          # 的话每天 Actions 都得从零再付费判一遍，跨日复用才省钱 + 稳定。
          git add site data/judge_cache.json data/enrich_cache.json data/video_cache.json data/github_state.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
          # Retry-with-rebase in case a human push landed while we were
          # translating: pull --rebase, replay our generated-data commit on
          # top, push again. Up to 3 attempts before giving up.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push attempt $i failed; rebasing and retrying"
            git pull --rebase --autostash origin main || exit 1
          done
          echo "push failed after 3 retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
