name: Daily build & deploy

on:
  schedule:
    # 每天 UTC 00:00 = 北京时间 08:00 跑一次
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      llm_backend:
        description: "LLM backend (dryrun | gemini | deepseek | openai)"
        required: false
        default: "gemini"

permissions:
  contents: write    # 允许把生成的 data 提交回仓库
  pages: write
  id-token: write

concurrency:
  group: redpaper-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          REDPAPER_LLM_BACKEND: ${{ inputs.llm_backend || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/build.py

      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data site/assets/img/covers || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
