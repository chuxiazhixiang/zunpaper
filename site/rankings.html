  <body>
    <header class="rp-app-bar">
      <div class="rp-app-bar__inner">
        <a class="rp-brand" href="index.html">
          <span class="rp-brand__logo"><img src="assets/img/setsuna.jpg" alt="" /></span>
          <span>redpaper</span>
        </a>
        <div class="rp-search">
          <span>🔍</span>
          <input id="search-input" type="search" placeholder="搜索标题 / 摘要 / 作者，回车跳回首页" />
        </div>
        <a class="rp-nav-btn" href="index.html" title="首页">
          <span class="rp-nav-btn__icon">←</span><span class="rp-nav-btn__label">首页</span>
        </a>
        <a class="rp-nav-btn" href="monthly.html" title="月度综述">
          <span class="rp-nav-btn__icon">📰</span><span class="rp-nav-btn__label">综述</span>
        </a>
        <a class="rp-nav-btn" href="insights.html" title="数据看板">
          <span class="rp-nav-btn__icon">📊</span><span class="rp-nav-btn__label">数据</span>
        </a>
        <a class="rp-nav-btn" href="favorites.html" title="收藏夹">
          <span class="rp-nav-btn__icon">❤</span><span class="rp-nav-btn__label">收藏</span>
        </a>
        <a class="rp-nav-btn" href="archive.html" title="每日归档">
          <span class="rp-nav-btn__icon">📅</span><span class="rp-nav-btn__label">归档</span>
        </a>
        <button id="theme-toggle" class="rp-icon-btn" title="切换主题" aria-label="切换主题">◐</button>
      </div>
    </header>

    <main class="rp-container">
      <h2 class="rp-page-title">🏆 排行榜</h2>
      <p class="rp-page-sub">
        按分数倒排。分数 = 频道关键词命中 + 顶尖实验室 / 关键作者 / HF Daily 上榜 +
        新鲜度 + 顶会 + 配套代码…（详细公式见每篇详情页的「为啥今天选了它」）
      </p>

      <nav class="rp-tabs rp-rank-tabs">
        <div class="rp-tabs__scroll">
          <button class="rp-tab is-active" data-window="day">☀️ 日榜</button>
          <button class="rp-tab" data-window="week">📅 周榜</button>
          <button class="rp-tab" data-window="month">📚 月榜</button>
          <button class="rp-tab" data-window="all">🌐 总榜</button>
          <button class="rp-tab" data-window="repos">🐙 开源 Star 榜</button>
        </div>
      </nav>

      <p id="rank-note" class="rp-rank-note" style="display:none;"></p>

      <ol id="rank-list" class="rp-rank-list">
        <li class="rp-status">加载中…</li>
      </ol>
    </main>

    <footer class="rp-footer">
      <p>
        <a href="index.html">← 首页</a> · <a href="about.html">关于</a> · redpaper
      </p>
