<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF2442" />
    <title>redpaper · 每日人形机器人论文</title>
    <link rel="icon" type="image/jpeg" href="assets/img/setsuna.jpg" />
    <link rel="apple-touch-icon" href="assets/img/setsuna.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css?v=e0db2207" />
  </head>
  <body>
    <header class="rp-app-bar">
      <div class="rp-app-bar__inner">
        <a class="rp-brand" href="index.html">
          <span class="rp-brand__logo"><img src="assets/img/setsuna.jpg" alt="" /></span>
          <span>redpaper</span>
          <span class="rp-brand__sub">每日人形机器人论文</span>
        </a>
        <div class="rp-search">
          <span>🔍</span>
          <input id="search-input" type="search" placeholder="搜索标题 / 摘要 / 作者" />
        </div>
        <a class="rp-nav-btn" href="monthly.html" title="月度综述">
          <span class="rp-nav-btn__icon">📰</span><span class="rp-nav-btn__label">综述</span>
        </a>
        <a class="rp-nav-btn" href="insights.html" title="数据看板">
          <span class="rp-nav-btn__icon">📊</span><span class="rp-nav-btn__label">数据</span>
        </a>
        <a class="rp-nav-btn" href="rankings.html" title="排行榜">
          <span class="rp-nav-btn__icon">🏆</span><span class="rp-nav-btn__label">排行</span>
        </a>
        <a class="rp-nav-btn" href="favorites.html" title="收藏夹">
          <span class="rp-nav-btn__icon">❤</span><span class="rp-nav-btn__label">收藏</span>
        </a>
        <a class="rp-nav-btn" href="archive.html" title="每日归档">
          <span class="rp-nav-btn__icon">📅</span><span class="rp-nav-btn__label">归档</span>
        </a>
        <a class="rp-nav-btn" href="https://github.com/Nangongyeee/redpaper" target="_blank" rel="noopener" title="GitHub 仓库">
          <span class="rp-nav-btn__icon">🐱</span><span class="rp-nav-btn__label">GitHub</span>
        </a>
        <button id="theme-toggle" class="rp-icon-btn" title="切换主题" aria-label="切换主题">◐</button>
      </div>
    </header>

    <div class="rp-modeswitch" id="mode-switch">
      <button class="rp-modeswitch__btn is-active" data-mode="papers">
        <span class="rp-modeswitch__icon">📄</span><span>论文</span>
      </button>
      <button class="rp-modeswitch__btn" data-mode="repos">
        <span class="rp-modeswitch__icon">🐙</span><span>开源项目</span>
      </button>
    </div>

    <!-- 会议投稿倒计时（最近 2-3 个 + 展开看全部；点会议名跳到该会议论文）。
         数据来自 config/conferences.yaml → data/conferences.json，倒计时前端实时算。 -->
    <div class="rp-conf" id="conf-countdown" hidden>
      <div class="rp-conf__bar">
        <span class="rp-conf__title">⏳ 会议投稿倒计时</span>
        <div class="rp-conf__pills" id="conf-pills"></div>
        <button class="rp-conf__more" id="conf-more" aria-expanded="false">全部会议 ▾</button>
      </div>
      <div class="rp-conf__panel" id="conf-panel" hidden></div>
    </div>

    <nav class="rp-tabs">
      <div id="channel-tabs" class="rp-tabs__scroll"></div>
    </nav>

    <!-- 会议筛选激活时的提示条（点会议名跳来；× 清除）。默认隐藏。 -->
    <div class="rp-venuebar" id="venue-bar" hidden></div>

    <main class="rp-container">
      <div id="crawl-banner" class="rp-crawl-banner" hidden></div>
      <section id="feed" class="rp-feed-root">
        <div class="rp-status">加载中…</div>
      </section>
    </main>

    <footer class="rp-footer">
      <p>
        redpaper · <a href="about.html">关于</a> ·
        <a href="https://github.com/Nangongyeee/redpaper">GitHub</a>
      </p>
    </footer>

    <script type="module" src="assets/js/feed.js?v=e0db2207"></script>
    <script type="module" src="assets/js/conferences.js?v=e0db2207"></script>
    <script type="module" src="assets/js/analytics.js?v=e0db2207"></script>
    <script src="assets/js/mascot.js?v=e0db2207" defer></script>
  </body>
</html>
