<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7BC83A" />
    <title>论文详情 · Zunpaper</title>
    <link rel="icon" type="image/jpeg" href="assets/img/zunmon_3005.png" />
    <link rel="apple-touch-icon" href="assets/img/zunmon_3005.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css?v=6820c700" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
      onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\\\(', right: '\\\\)', display: false}, {left: '\\\\[', right: '\\\\]', display: true}], throwOnError: false });"
    ></script>
  </head>
  <body>
    <header class="rp-app-bar">
      <div class="rp-app-bar__inner">
        <a class="rp-brand" href="index.html">
          <span class="rp-brand__logo"><img src="assets/img/zunmon_3005.png" alt="" /></span>
          <span>Zunpaper</span>
        </a>
        <div class="rp-search">
          <span>🔍</span>
          <input id="search-input" type="search" placeholder="搜索标题 / 摘要 / 作者，回车跳回首页" />
        </div>
        <a class="rp-nav-btn" href="index.html" title="回到首页">
          <span class="rp-nav-btn__icon">←</span><span class="rp-nav-btn__label">首页</span>
        </a>
        <a class="rp-nav-btn" href="monthly.html" title="月度综述">
          <span class="rp-nav-btn__icon">📰</span><span class="rp-nav-btn__label">综述</span>
        </a>
        <a class="rp-nav-btn" href="insights.html" title="数据看板">
          <span class="rp-nav-btn__icon">📊</span><span class="rp-nav-btn__label">数据</span>
        </a>
        <a class="rp-nav-btn" href="rankings.html" title="排行榜">
          <span class="rp-nav-btn__icon">🏆</span><span class="rp-nav-btn__label">排行</span>
        </a>
        <a class="rp-nav-btn" href="favorites.html" title="收藏夹">
          <span class="rp-nav-btn__icon">❤</span><span class="rp-nav-btn__label">收藏</span>
        </a>
        <button id="theme-toggle" class="rp-icon-btn" title="切换主题" aria-label="切换主题">◐</button>
      </div>
    </header>

    <main class="rp-post">
      <div id="post-root">
        <div class="rp-status">加载中…</div>
      </div>
    </main>

    <!-- 笔记面板 -->
    <div id="note-panel" class="rp-note-panel" style="display:none;">
      <div class="rp-note-panel__header">
        <span>📝 论文笔记</span>
        <button id="note-panel-close" class="rp-icon-btn">✕</button>
      </div>
      <div class="rp-note-panel__body">
        <div id="note-empty" style="text-align:center;padding:60px 0;color:var(--rp-text-soft);font-size:14px;">
          <p>这篇论文还没有笔记。<br>运行 build 脚本后会自动生成。</p>
        </div>
        <div id="note-content" style="display:none;">
          <div id="note-text" class="rp-note-render"></div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button id="note-download-btn" class="rp-btn rp-btn--primary">⬇ 下载 .md</button>
            <button id="note-copy-btn" class="rp-btn">📋 复制</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="rp-footer">
      <p>
        <a href="index.html">← 首页</a> · <a href="favorites.html">收藏夹</a> ·
        <a href="archive.html">归档</a> · <a href="about.html">关于</a> · Zunpaper
      </p>
    </footer>

    <script type="module" src="assets/js/post.js?v=6820c700"></script>
    <script type="module" src="assets/js/analytics.js?v=6820c700"></script>
    <!-- <script src="assets/js/mascot.js?v=6820c700" defer></script> -->
  </body>
</html>
